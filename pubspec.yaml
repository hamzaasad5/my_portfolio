name: portfolio
description: Flutter Developer Portfolio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  visibility_detector: ^0.4.0+2
  scrollable_positioned_list: ^0.3.8
  animate_do: ^3.3.4
  font_awesome_flutter: ^10.7.0
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.1.0
  video_player: ^2.8.3
  chewie: ^1.7.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/food_pickup_app/